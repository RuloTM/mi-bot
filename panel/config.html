<h2>CONFIG SCREEN OK 2026-04-11</h2>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configuración del negocio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      margin: 0;
      padding: 24px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d8dbe2;
      border-radius: 10px;
      font-size: 14px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .actions {
      margin-top: 20px;
      display: flex;
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 14px;
      cursor: pointer;
    }

    .primary {
      background: #111827;
      color: white;
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .msg {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      display: none;
    }

    .msg.ok {
      background: #dcfce7;
      color: #166534;
      display: block;
    }

    .msg.error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 18px;
      text-decoration: none;
      color: #111827;
      font-weight: bold;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .full {
        grid-column: auto;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="back-link" href="/panel/">← Volver al panel</a>
    <h1>Configuración del negocio</h1>

    <form id="config-form">
      <div class="grid">
        <div>
          <label for="name">Nombre del negocio</label>
          <input id="name" type="text" />
        </div>

        <div>
          <label for="city">Ciudad base</label>
          <input id="city" type="text" />
        </div>

        <div>
          <label for="shipping_cost">Costo de envío</label>
          <input id="shipping_cost" type="number" step="0.01" />
        </div>

        <div>
          <label for="support_hours">Horario de soporte</label>
          <input id="support_hours" type="text" />
        </div>

        <div class="full">
          <label for="payment_methods">Métodos de pago</label>
          <input id="payment_methods" type="text" />
        </div>

        <div class="full">
          <label for="welcome_message">Mensaje de bienvenida</label>
          <textarea id="welcome_message"></textarea>
        </div>

        <div class="full">
          <label for="prompt">Prompt del bot</label>
          <textarea id="prompt"></textarea>
        </div>

        <div>
          <label for="active">Servicio activo</label>
          <select id="active">
            <option value="true">Activo</option>
            <option value="false">Inactivo</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button type="submit" class="primary">Guardar cambios</button>
        <button type="button" class="secondary" id="reload-btn">Recargar</button>
      </div>

      <div id="msg" class="msg"></div>
    </form>
  </div>

  <script type="module" src="/panel/config.js"></script>
</body>
</html>
