<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Productos</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin-bottom: 8px;
      font-size: 36px;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    form {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr auto;
      gap: 10px;
    }

    input, select, button {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 14px;
    }

    button {
      background: #0f172a;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    thead {
      background: #0f172a;
      color: white;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
    }

    .badge {
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .activo {
      background: #dcfce7;
      color: #166534;
    }

    .inactivo {
      background: #fee2e2;
      color: #991b1b;
    }

    .actions button {
      margin-right: 5px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .topbar a {
      text-decoration: none;
      font-weight: bold;
      color: #111827;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="topbar">
      <div>
        <h1>Productos</h1>
        <div class="subtitle">Administra tu catálogo</div>
      </div>
      <a href="/">← Volver a pedidos</a>
    </div>

    <!-- FORMULARIO -->
    <div class="card">
      <h3 id="form-title">Agregar producto</h3>

      <form id="product-form">
        <input id="name" type="text" placeholder="Nombre del producto" required />
        <input id="price" type="number" placeholder="Precio" required />
        
        <select id="active">
          <option value="true">Activo</option>
          <option value="false">Inactivo</option>
        </select>

        <button type="submit" id="save-btn">Guardar</button>

        <input type="hidden" id="editing-id" />
      </form>
    </div>

    <!-- TABLA -->
    <table>
      <thead>
        <tr>
          <th>Producto</th>
          <th>Precio</th>
          <th>Estatus</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody id="products-body">
        <!-- Aquí se cargan los productos -->
      </tbody>
    </table>

  </div>

  <!-- JS -->
  <script src="/products.js"></script>

</body>
</html>
